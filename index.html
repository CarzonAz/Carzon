<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CARZON — ABŞ Avtomobil Xidməti</title>
  <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/CarzonAz/Carzon/main/Logo.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="main-nav" id="mainNav">
    <a href="index.html" class="nav-logo">CARZON</a>
    
    <div class="nav-links" id="navLinks">
      <a href="index.html#shipping" class="nav-link nav-link--active">Daşınma</a>
      <a href="gomruk.html" class="nav-link">Gömrük</a>
      <a href="haqqimizda.html" class="nav-link">Haqqımızda</a>
    </div>

    <div class="nav-contacts">
      <a href="haqqimizda.html#contact" class="nav-contact-btn">Əlaqə</a>
      
      <button class="hamburger" id="hamburger" aria-label="Menü">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <section class="hero" id="shipping">
    
    <video class="hero-video" autoplay loop muted playsinline>
      <source src="https://raw.githubusercontent.com/CarzonAz/Carzon/main/bg.mp4" type="video/mp4">
      Sizin brauzeriniz video teqini dəstəkləmir.
    </video>
    
    <div class="hero-video-overlay"></div>
    
    <div class="hero-content">
      <h1>ABŞ-dan Avtomobil Daşınması</h1>
      <p>Ştatı və hərracı seçərək logistika xərclərini dərhal hesablayın.</p>
      
      <div class="calc-container">
        <form id="shippingForm" onsubmit="return false;">
          
          <div class="form-group">
            <label for="stateSelect">Ştat</label>
            <select id="stateSelect">
              <option value="">-- Ştat Seçin --</option>
            </select>
          </div>

          <div class="form-group">
            <label for="auctionSelect">Hərrac</label>
            <select id="auctionSelect">
              <option value="">-- Hərrac Seçin --</option>
              <option value="copart">Copart</option>
              <option value="iaai">IAAI</option>
            </select>
          </div>

          <div class="form-group">
            <label for="citySelect">Şəhər / Meydança</label>
            <select id="citySelect">
              <option value="">-- Əvvəlcə Ştat Seçin --</option>
            </select>
          </div>

          <button type="button" class="btn-calc" id="calcShippingBtn">Hesabla</button>
        </form>

        <div class="loader" id="loader"></div>

        <div class="result-box" id="shippingResult">
          <div class="result-row">
            <span>Bakı portuna qədər daşınma:</span>
            <span id="shipCost" style="font-weight: 700; color: #fff;">$0</span>
          </div>
        </div>

      </div>
    </div>
  </section>

  <footer style="text-align: center; padding: 40px 20px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 14px; color: rgba(255,255,255,0.4);">
    <p>© 2026 CARZON. Bütün hüquqlar qorunur.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
