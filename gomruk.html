<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gömrük Kalkulyatoru — CARZON</title>
  <link rel="icon" type="image/png" sizes="32x32" href="https://www.car-zon.az/Logo/main-logo.png">
  <link rel="icon" type="image/png" sizes="16x16" href="https://www.car-zon.az/Logo/main-logo.png">
  <link rel="shortcut icon" href="https://www.car-zon.az/Logo/main-logo.png" type="image/png">
  <link rel="apple-touch-icon" href="https://www.car-zon.az/Logo/main-logo.png">

  <link rel="stylesheet" href="style.css">
  <style>
    .fade-load .nav-links::before {
      transition: opacity 0.4s ease-out !important;
      opacity: 0 !important;
    }
    .fade-load-active .nav-links::before {
      opacity: 1 !important;
    }
    @media (max-width: 768px) {
      .nav-contacts {
        display: flex !important;
        align-items: center !important;
        gap: 10px !important;
      }
      .nav-contacts .nav-contact-btn {
        display: inline-flex !important;
        align-items: center !important;
        justify-content: center !important;
        background: #ffffff !important;
        color: #111a2e !important;
        padding: 8px 16px !important;
        font-size: 13px !important;
        font-weight: 600 !important;
        border-radius: 10px !important;
        border: none !important;
        box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
        transition: all 0.2s ease;
      }
      .nav-contacts .nav-contact-btn span {
        display: inline-block !important;
      }
    }
  </style>
  <script>
    /* Gömrük səhifəsinin real menyu indeksi 3-dür */
    localStorage.setItem("prevNavIndex", "3");
    document.documentElement.classList.add("fade-load");
  </script>
</head>
<body>

  <nav class="main-nav" id="mainNav">
    <a href="index.html" class="nav-logo">CARZON</a>
    
    <div class="nav-links" id="navLinks">
      <a href="index.html" class="nav-link" id="navHomeBtn" data-index="0">Ana Səhifə</a>
      <a href="index.html#scrollToCalc" class="nav-link" data-index="1">Daşınma</a>
      <a href="agillihesab.html" class="nav-link" data-index="2">Ağıllı Hesablama</a>
      <a href="gomruk.html" class="nav-link nav-link--active" id="navCustomsBtn" data-index="3">Rəsmi Gömrük</a>
      <a href="haqqimizda.html" class="nav-link" data-index="4">Haqqımızda</a>
    </div>
    
    <div class="nav-contacts">
      <button class="nav-contact-btn" id="navContactBtn"><span>Əlaqə</span></button>
      <button class="hamburger" id="hamburger" aria-label="Menü">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <section class="calc-section" style="padding-top: 140px; padding-bottom: 60px;">
    <div class="calc-container">
      <div class="calc-title-badge">
        <h2>Gömrük Hesablanması</h2>
      </div>
      
      <form id="customsForm" onsubmit="return false;">
        <div class="form-group">
          <label for="engineType">Mühərrikin növü *</label>
          <select id="engineType">
            <option value="0">Benzin</option>
            <option value="1">Dizel</option>
            <option value="2">Qaz (LPG)</option>
            <option value="3">Hibrid (Benzin + Elektrik)</option>
            <option value="4">Hibrid (Dizel + Elektrik)</option>
            <option value="5">Elektrik</option>
            <option value="6">Plug-in Hibrid</option>
          </select>
        </div>

        <input type="hidden" id="commerceType" value="0">

        <div class="form-group">
          <label for="engine">Mühərrikin həcmi (sm³) *</label>
          <input type="number" id="engine" step="any" placeholder="Məs: 1.6 və ya 1597 (Elektrik üçün 0 yazın)" min="0">
        </div>

        <div class="form-group" style="display: flex; gap: 16px;">
          <div style="flex: 1;">
            <label for="manufactureYear">İstehsal ili *</label>
            <select id="manufactureYear">
              <option value="2026">2026</option>
              <option value="2025">2025</option>
              <option value="2024">2024</option>
              <option value="2023">2023</option>
              <option value="2022">2022</option>
              <option value="2021">2021</option>
              <option value="2020">2020</option>
              <option value="2019">2019</option>
              <option value="2018">2018</option>
              <option value="2017">2017</option>
              <option value="2016">2016</option>
              <option value="2015">2015</option>
              <option value="2014">2014</option>
              <option value="2013">2013</option>
              <option value="2012">2012</option>
              <option value="2011">2011</option>
              <option value="2010">2010</option>
              <option value="2009">2009</option>
              <option value="2008">2008</option>
              <option value="2007">2007</option>
              <option value="2006">2006</option>
              <option value="2005">2005</option>
              <option value="2004">2004</option>
              <option value="2003">2003</option>
              <option value="2002">2002</option>
              <option value="2001">2001</option>
              <option value="2000">2000</option>
            </select>
          </div>
          <div style="flex: 1;">
            <label for="manufactureMonth">İstehsal ayı *</label>
            <select id="manufactureMonth">
              <option value="01">Yanvar</option><option value="02">Fevral</option><option value="03">Mart</option>
              <option value="04">Aprel</option><option value="05">May</option><option value="06">İyun</option>
              <option value="07">İyul</option><option value="08">Avqust</option><option value="09">Sentyabr</option>
              <option value="10">Oktyabr</option><option value="11">Noyabr</option><option value="12">Dekabr</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="carCost">İnvoys (Alış) qiyməti (USD) *</label>
          <input type="number" id="carCost" placeholder="Avtomobilin xalis alış dəyəri" min="0">
        </div>

        <div class="form-group">
          <label for="shippingCost">Daşınma xərci (USD) *</label>
          <input type="number" id="shippingCost" placeholder="Logistika taşıma bədəlini əllə daxil edin" min="0">
        </div>

        <input type="hidden" id="otherCost" value="0">

        <button type="button" class="btn-calc" id="calcCustomsBtn">Gömrüyü Hesabla</button>
      </form>

      <div class="loader" id="loader"></div>

      <div class="result-box" id="customsResult">
        <h3 style="font-size: 15px; color: #fff; margin-bottom: 16px; text-align: center; letter-spacing: 1px; font-weight: 600;">HESABLANMIŞ RÜSUMLAR</h3>
        
        <div id="dutyRowsContainer"></div>
        
        <div class="usd-rate" id="usdRate" style="font-size: 13px; font-weight: 600; color: #3498db; text-align: left; margin-top: 16px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.05);"></div>
        
        <div id="legalNotice" style="font-size: 11px; line-height: 1.5; color: rgba(255,255,255,0.4); text-align: left; margin-top: 8px; font-style: italic;"></div>

        <div class="result-total">
          <span style="color: #25D366;">Yekun Gömrük Ödənişi</span>
          <span id="totalCustomsCost" style="color: #25D366; font-weight: 700;">0.00 AZN</span>
        </div>
      </div>
      
      <div class="error-box" id="customsError"></div>
    </div>
  </section>

  <section class="contact-section" id="contactSection">
    <div class="contact-grid">
      <a href="https://wa.me/994101101516" target="_blank" class="contact-card wa-card">
        <div class="card-icon"><img src="Logo/whatsapp.png" alt="WhatsApp" width="36" height="36"></div>
        <h3>WhatsApp</h3><p>Canlı Dəstək</p>
      </a>
      <a href="https://www.instagram.com/carzon.az" target="_blank" class="contact-card insta-card">
        <div class="card-icon"><img src="Logo/instagram.png" alt="Instagram" width="36" height="36"></div>
        <h3>Instagram</h3><p>Carzon.az</p>
      </a>
      <a href="https://www.tiktok.com/@carzon.az" target="_blank" class="contact-card tiktok-card">
        <div class="card-icon"><img src="Logo/tiktok.png" alt="TikTok" width="34" height="34"></div>
        <h3>TikTok</h3><p>Carzon.az</p>
      </a>
      <a href="tel:+994101101516" class="contact-card call-card">
        <div class="card-icon"><img src="Logo/call.png" alt="Zəng" width="36" height="36"></div>
        <h3>Zəng Et</h3><p>+994 10 110 15 16</p>
      </a>
      <a href="mailto:info@car-zon.az" class="contact-card mail-card">
        <div class="card-icon"><img src="Logo/mail.png" alt="E-poçt" width="36" height="36"></div>
        <h3>E-Poçt</h3><p>info@car-zon.az</p>
      </a>
    </div>
  </section>

  <footer style="text-align: center; padding: 40px 20px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 14px; color: rgba(255,255,255,0.4);">
    <p>© 2026 CARZON. Bütün hüquqlar qorunur.</p>
  </footer>

  <button class="scroll-to-top" id="scrollToTopBtn" aria-label="Yuxarı qayıt">↑</button>

  <a href="https://wa.me/994101101516" target="_blank" class="whatsapp-sticky" aria-label="WhatsApp">
    <img src="Logo/whatsapp-sabit.png" alt="WhatsApp" width="34" height="34">
  </a>

  <script src="script.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const localContactBtn = document.getElementById('navContactBtn');
      const hamburger = document.getElementById("hamburger");
      const navLinks = document.getElementById("navLinks");
      const navLinksContainer = document.querySelector(".nav-links");

      if (localContactBtn) {
        localContactBtn.addEventListener('click', function() {
          if (hamburger && navLinks && navLinks.classList.contains("open")) {
            hamburger.classList.remove("open");
            navLinks.classList.remove("open");
          }
          const contactSec = document.getElementById('contactSection');
          if (contactSec) {
            window.scrollTo({
              top: (contactSec.getBoundingClientRect().top + window.pageYOffset - 80),
              behavior: 'smooth'
            });
          }
        });
      }

      if (navLinksContainer && document.documentElement.classList.contains("fade-load")) {
        const activeLink = document.querySelector(".nav-link--active");
        if (activeLink) {
          const containerRect = navLinksContainer.getBoundingClientRect();
          const activeRect = activeLink.getBoundingClientRect();
          if (window.innerWidth > 768) {
            navLinksContainer.style.setProperty("--slide-left", `${activeRect.left - containerRect.left}px`);
            navLinksContainer.style.setProperty("--slide-width", `${activeRect.width}px`);
          } else {
            navLinksContainer.style.setProperty("--slide-top", `${activeRect.top - containerRect.top}px`);
            navLinksContainer.style.setProperty("--slide-height", `${activeRect.height}px`);
          }
        }
        setTimeout(() => {
          document.documentElement.classList.add("fade-load-active");
          setTimeout(() => {
            document.documentElement.classList.remove("fade-load", "fade-load-active");
          }, 400);
        }, 50);
      }
    });
  </script>
</body>
</html>
