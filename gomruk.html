<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gömrük Rüsumu — CARZON</title>
  <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/CarzonAz/Carzon/main/Logo.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="main-nav" id="mainNav">
    <a href="index.html" class="nav-logo">CARZON</a>
    
    <div class="nav-links" id="navLinks">
      <a href="index.html#shipping" class="nav-link">Daşınma</a>
      <a href="gomruk.html" class="nav-link nav-link--active">Gömrük</a>
      <a href="haqqimizda.html" class="nav-link">Haqqımızda</a>
    </div>

    <div class="nav-contacts">
      <a href="haqqimizda.html#contact" class="nav-contact-btn">Əlaqə</a>
      
      <button class="hamburger" id="hamburger" aria-label="Menü">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <section class="hero">
    <div class="customs-glow" style="position: absolute; top: 10%; left: 50%; transform: translate(-50%, 0); width: 500px; height: 500px; background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, rgba(11,18,32,0) 70%); pointer-events: none; z-index: 1;"></div>
    
    <div class="hero-content">
      <h1 style="font-size: 48px; text-shadow: 0 4px 20px rgba(0,0,0,0.6); margin-bottom: 16px;">Gömrük Kalkulyatoru</h1>
      <p style="font-size: 16px; color: rgba(255,255,255,0.6); margin-bottom: 40px;">Azərbaycan Respublikasının qanunvericiliyinə uyğun olaraq təxmini rüsumu hesablayın.</p>
      
      <div class="calc-container" style="max-width: 480px;">
        <form id="customsForm">
          
          <div class="form-group">
            <label for="carPrice">Avtomobilin qiyməti (Alış qiyməti $)</label>
            <input type="number" id="carPrice" placeholder="Məsələn: 5000" required>
          </div>

          <div class="form-group">
            <label for="carYear">Buraxılış ili</label>
            <select id="carYear" required>
              <option value="">-- İl Seçin --</option>
              <option value="2026">2026</option>
              <option value="2025">2025</option>
              <option value="2024">2024</option>
              <option value="2023">2023</option>
              <option value="2022">2022</option>
              <option value="2021">2021</option>
              <option value="2020">2020</option>
              <option value="2019">2019</option>
              <option value="2018">2018</option>
              <option value="2017">2017</option>
              <option value="2016">2016</option>
              <option value="2015">2015</option>
              <option value="2014">Köhnə (2014 və ya daha az)</option>
            </select>
          </div>

          <div class="form-group">
            <label for="engineCapacity">Mühərrik həcmi (sm³)</label>
            <input type="number" id="engineCapacity" placeholder="Məsələn: 1998" required>
          </div>

          <div class="form-group">
            <label for="fuelType">Yanacaq növü</label>
            <select id="fuelType" required>
              <option value="">-- Seçin --</option>
              <option value="petrol">Benzin</option>
              <option value="diesel">Dizel</option>
              <option value="hybrid">Hibrid</option>
              <option value="electric">Elektro</option>
            </select>
          </div>

          <button type="submit" class="btn-calc">Gömrüyü Hesabla</button>
        </form>

        <div id="dutyError" style="display: none; color: #ff6b6b; margin-top: 15px; font-size: 14px; font-weight: 600;"></div>

        <div class="loader" id="loader"></div>

        <div class="result-box" id="dutyResult">
          <div class="result-row">
            <span>İdxal rüsumu:</span>
            <span id="resDuty">0 ₼</span>
          </div>
          <div class="result-row">
            <span>ƏDV (18%):</span>
            <span id="resVat">0 ₼</span>
          </div>
          <div class="result-row">
            <span>Yekun Gömrük Rüsumu:</span>
            <span id="resTotal">0 ₼</span>
          </div>
        </div>

      </div>
    </div>
  </section>

  <footer style="text-align: center; padding: 40px 20px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 14px; color: rgba(255,255,255,0.4);">
    <p>© 2026 CARZON. Bütün hüquqlar qorunur.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
